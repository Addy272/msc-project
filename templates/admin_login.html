<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Stock Price Forecasting System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-intro">
            <div>
                <p class="auth-kicker">Stock Price Forecasting System</p>
                <h1>Admin Login</h1>
                <p class="auth-copy">
                    Secure access to the dashboard, model operations, and live project data.
                </p>
            </div>

            <nav class="auth-links">
                <a href="{{ url_for('index') }}" class="nav-link">Home</a>
                <a href="{{ url_for('about') }}" class="nav-link">About</a>
                <a href="{{ url_for('coverage') }}" class="nav-link">Coverage</a>
            </nav>
        </section>

        <section class="admin-login-card auth-card">
            <h2>Sign In</h2>

            {% if error %}
            <div class="status-message show error">{{ error }}</div>
            {% endif %}

            <form method="post" class="admin-form">
                <label for="username">Username</label>
                <input
                    id="username"
                    name="username"
                    type="text"
                    required
                    autocomplete="username"
                    autofocus
                    value="{{ request.form.get('username', '') }}"
                >

                <label for="password">Password</label>
                <input
                    id="password"
                    name="password"
                    type="password"
                    required
                    autocomplete="current-password"
                >

                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
        </section>
    </main>

    <footer class="auth-footer">
        <p>&copy; 2024 Stock Price Forecasting System | MSc IT Project</p>
    </footer>
</body>
</html>
